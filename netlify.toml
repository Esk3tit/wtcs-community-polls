# Build config — keeps deploy behavior deterministic across reviewers.
# SPA fallback stays in public/_redirects (already correct); no redirects block here.

[build]
  # VITE_COMMIT_SHA is re-exported from Netlify's built-in $COMMIT_REF so Sentry
  # error reports tag the exact deploy commit (src/main.tsx reads it at build time).
  # Keep this in the build command — Netlify UI env vars are literal strings and
  # don't expand $COMMIT_REF.
  command = "VITE_COMMIT_SHA=$COMMIT_REF npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # NPM_FLAGS intentionally unset — `npm ci` already enforces lockfile strictness.

# Production-only headers: forbid framing + enforce MIME sniffing discipline.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
