# SPA fallback lives in public/_redirects.

[build]
  # Re-export Netlify's built-in $COMMIT_REF and $CONTEXT as VITE_*-prefixed
  # vars so Vite ships them to the browser bundle. Done here (not in
  # [build.environment]) because that block sets literal strings, not shell
  # substitutions. VITE_COMMIT_SHA → Sentry release; VITE_NETLIFY_CONTEXT →
  # both Sentry's environment field and the /__smoke route's prod gate.
  command = "npm ci && VITE_COMMIT_SHA=$COMMIT_REF VITE_NETLIFY_CONTEXT=$CONTEXT npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# CSP is intentionally NOT set here. A correct policy must enumerate
# connect-src for Sentry ingest, PostHog, Supabase, and the Discord avatar CDN
# plus img-src/font-src for shadcn assets — any miss silently bricks
# observability or live data. Roll out via Report-Only first.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
