# Weekly grouped dependency updates.
#
# Architecturally significant (not just supply-chain hygiene): Dependabot's
# weekly Monday commits reset the 60-day scheduled-workflow inactivity clock
# (Pitfall 2) — this is what keeps .github/workflows/cron-sweep.yml alive for
# low-traffic launch periods.
#
# Note: Dependabot does NOT scan esm.sh imports in supabase/functions/** —
# those are unmanaged strings. D-16 §3 pins them manually; the upgrade ritual
# is documented in README §12 (Plan 05-10).
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      # Group eslint + plugins together (incl. majors). The packages share
      # a peer-dep chain (eslint <-> @eslint/js, plugins -> eslint), so a
      # major bump must ship as one combined PR — Dependabot's individual
      # eslint vs. @eslint/js PRs both fail `npm ci` with peer-dep
      # conflicts on the other side. Listed BEFORE minor-and-patch so
      # even minor/patch eslint bumps roll up here.
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"
          - "typescript-eslint"
        update-types: [major, minor, patch]
      minor-and-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    labels: [dependencies, automated]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ['*']
    open-pull-requests-limit: 3
    labels: [dependencies, ci]
